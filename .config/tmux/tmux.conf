
# -----------------------------
# Terminal / Colors
# -----------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ",xterm-256color:RGB"

# -----------------------------
# General behaviour
# -----------------------------
set -g mouse on
set -g focus-events on
set -g status-position bottom
set -g status-interval 5
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"
set -g history-limit 1000000
set -g set-clipboard on
set -g detach-on-destroy off
set -sg escape-time 10

# -----------------------------
# Window / Pane indexing
# -----------------------------
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# -----------------------------
# Prefix key
# -----------------------------
unbind C-b
set -g prefix C-y
bind-key C-y send-prefix

# -----------------------------
# Splits
# -----------------------------
unbind %
bind = split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# -----------------------------
# Resize panes
# -----------------------------
bind h resize-pane -L 5
bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
bind -r m resize-pane -Z

# -----------------------------
# Reload config / sessions
# -----------------------------
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"
bind M-c attach-session -c "#{pane_current_path}"

# -----------------------------
# Modes and selection
# -----------------------------
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# -----------------------------
# Sync panes
# -----------------------------
bind S set-window-option synchronize-panes

# -----------------------------
# Vim navigation integration
# -----------------------------
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
 | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'

if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
 "bind-key -n C-\\ if-shell \"$is_vim\" 'send-keys C-\\' 'select-pane -l'"

if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
 "bind-key -n C-\\ if-shell \"$is_vim\" 'send-keys C-\\\\' 'select-pane -l'"

# -----------------------------
# Plugins
# -----------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# -----------------------------
# Plugin config
# -----------------------------
set -g @catppuccin_flavor 'mocha'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-session-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# -----------------------------
# Start TPM
# -----------------------------
run '~/.config/tmux/plugins/tpm/tpm'

# -----------------------------
# Sleek status line
# -----------------------------
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g message-style "fg=#1e1e2e,bg=#89b4fa"
set -g message-command-style "fg=#1e1e2e,bg=#89b4fa"
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

set -g status-left-length 20
set -g status-right-length 120
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#1e1e2e,nobold]"
set -g window-status-separator ""
set -g window-status-format "#[fg=#6c7086,bg=#1e1e2e] #I #[fg=#bac2de,bg=#313244] #W #[fg=#313244,bg=#1e1e2e]"
set -g window-status-current-format "#[fg=#1e1e2e,bg=#cba6f7,bold] #I #[fg=#cdd6f4,bg=#45475a,bold] #W#{?window_zoomed_flag, 󰁌,} #[fg=#45475a,bg=#1e1e2e,nobold]"
set -g status-right "#[fg=#a6e3a1,bg=#1e1e2e]#(whoami)@#H #[fg=#6c7086,bg=#1e1e2e]| #[fg=#89b4fa,bg=#1e1e2e]#{b:pane_current_path} #[fg=#6c7086,bg=#1e1e2e]| #[fg=#f9e2af,bg=#1e1e2e]%a %d %b #[fg=#cba6f7,bg=#1e1e2e,bold]%H:%M "
